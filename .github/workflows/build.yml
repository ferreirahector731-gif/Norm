name: Build All Platforms

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    name: Windows
    runs-on: windows-2022
    defaults:
      run:
        working-directory: ./norm_src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: 'norm_src'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build
        run: flutter build windows --release

      - name: Verify binary exists
        run: |
          $buildDir = "build\windows\x64\runner\Release"
          $exe = Get-ChildItem "$buildDir\*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe found in ${buildDir}!"
            exit 1
          }
          Write-Output "$($exe.Name) ✅"

      - name: Build MSIX installer
        run: |
          dart run msix:create --install-certificate false

      - name: Verify MSIX exists
        run: |
          Write-Host "Buscando archivos .msix en el workspace..."
          $msixFiles = Get-ChildItem -Path "." -Recurse -Filter "*.msix" -ErrorAction SilentlyContinue

          if ($msixFiles) {
              Write-Host "Se encontro el instalador MSIX en: $($msixFiles[0].FullName)"
              Copy-Item -Path $msixFiles[0].FullName -Destination ".\Norm_${{ github.ref_name }}.msix" -Force
              Write-Host "Instalador copiado exitosamente a .\Norm_${{ github.ref_name }}.msix"
          } else {
              Write-Host "Estructura actual del directorio build:"
              Get-ChildItem -Path ".\build" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
              Write-Error "No se encontro ningun archivo .msix en todo el espacio de trabajo!"
          }

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /O".\installer\Output" /F"Norm_${{ github.ref_name }}_Setup" .\installer\setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            Norm_${{ github.ref_name }}.msix
            installer\Output\Norm_${{ github.ref_name }}_Setup.exe

  build-android:
    continue-on-error: true
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./norm_src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: 'norm_src'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build APKs (split-per-abi)
        run: flutter build apk --release --split-per-abi

      - name: Verify APKs exist
        run: |
          ls -la build/app/outputs/flutter-apk/
          if ls build/app/outputs/flutter-apk/app-arm64-v8a-release.apk 1>/dev/null 2>&1; then
            echo "APKs ✅"
          else
            echo "APKs not found, trying universal..."
            ls build/app/outputs/flutter-apk/app-release.apk 1>/dev/null 2>&1 && echo "universal APK found"
          fi

      - name: Package
        run: |
          mkdir -p artifacts
          if [ -f build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk artifacts/Norm_${{ github.ref_name }}_arm64-v8a.apk
          fi
          if [ -f build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/Norm_${{ github.ref_name }}_armeabi-v7a.apk
          fi
          if [ -f build/app/outputs/flutter-apk/app-x86_64-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-x86_64-release.apk artifacts/Norm_${{ github.ref_name }}_x86_64.apk
          fi
          # Fallback: universal APK
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-release.apk artifacts/Norm_${{ github.ref_name }}.apk
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./norm_src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: 'norm_src'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build
        run: flutter build linux --release --verbose

      - name: Verify bundle exists
        run: |
          if [ -d "build/linux/x64/release/bundle" ]; then
            echo "bundle dir ✅"
          else
            echo "bundle dir not found!"
            ls -la build/linux/x64/release/
            exit 1
          fi

      - name: Package
        run: |
          cd build/linux/x64/release/bundle
          tar czf "Norm_Linux_${{ github.ref_name }}.tar.gz" *

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Norm_Linux_${{ github.ref_name }}.tar.gz

  build-macos:
    continue-on-error: true
    name: macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./norm_src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: 'norm_src'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build
        run: |
          flutter build macos --release --verbose 2>&1
          BUILD_EXIT_CODE=$?
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ Build de macOS falló con código $BUILD_EXIT_CODE"
            exit $BUILD_EXIT_CODE
          fi

      - name: Verify app exists
        run: |
          if [ -d "build/macos/Build/Products/Release/nota_ia_app.app" ]; then
            echo "nota_ia_app.app ✅"
          else
            echo "app not found!"
            ls -la build/macos/Build/Products/Release/
            exit 1
          fi

      - name: Package macOS
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y "Norm_macOS_${{ github.ref_name }}.zip" "nota_ia_app.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: Norm_macOS_${{ github.ref_name }}.zip

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-android, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Norm ${{ github.ref_name }}
          body: |
            ## Norm ${{ github.ref_name }}

            ### 📥 Descargas

            **Windows**
            - `Norm_${{ github.ref_name }}.msix` — Instalador MSIX
            - `Norm_${{ github.ref_name }}_Setup.exe` — Instalador Inno Setup

            **Linux**
            - `Norm_Linux_${{ github.ref_name }}.tar.gz` — Bundle portable

            **Android** (experimental)
            - `Norm_${{ github.ref_name }}_arm64-v8a.apk` — Dispositivos modernos
            - `Norm_${{ github.ref_name }}_armeabi-v7a.apk` — Dispositivos antiguos
            - `Norm_${{ github.ref_name }}_x86_64.apk` — Emuladores

            **macOS** (experimental)
            - `Norm_macOS_${{ github.ref_name }}.zip` — Aplicación para macOS
          draft: false
          prerelease: false
          files: artifacts/*/*

  deploy-pages:
    runs-on: ubuntu-latest
    needs: release
    if: success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: 'norm_src'
          fetch-depth: 0
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: norm_src/docs
          publish_branch: gh-pages
          force_orphan: true
