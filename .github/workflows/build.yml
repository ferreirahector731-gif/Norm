name: Build All Platforms

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    name: Windows
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build
        run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Norm_Windows_${{ github.ref_name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Norm_Windows_${{ github.ref_name }}.zip

  build-android:
    continue-on-error: true
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36"

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build APKs (split-per-abi)
        run: flutter build apk --release --split-per-abi

      - name: Package
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk artifacts/Norm_${{ github.ref_name }}_arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/Norm_${{ github.ref_name }}_armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk artifacts/Norm_${{ github.ref_name }}_x86_64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/

  build-linux:
    name: Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build
        run: flutter build linux --release

      - name: Package
        run: |
          cd build/linux/x64/release/bundle
          tar czf ../../../../../Norm_Linux_${{ github.ref_name }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Norm_Linux_${{ github.ref_name }}.tar.gz

  build-macos:
    continue-on-error: true
    name: macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build
        run: |
          flutter build macos --release
          BUILD_EXIT_CODE=$?
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ Build de macOS falló con código $BUILD_EXIT_CODE"
            exit $BUILD_EXIT_CODE
          fi

      - name: Package macOS
        run: |
          cd build/macos/Build/Products/Release || exit 1
          echo "Contenido del directorio:"
          ls -la
          if ! ls *.app &> /dev/null; then
            echo "❌ Error: No se encontró ningún .app en $(pwd)"
            exit 1
          fi
          APP_NAME=$(ls *.app | head -1)
          echo "Empaquetando $APP_NAME"
          zip -r "../../../../Norm_macOS_v1.3.0.zip" "$APP_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: Norm_macOS_v1.3.0.zip

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Norm ${{ github.ref_name }}
          body: |
            ## Norm ${{ github.ref_name }}

            ### Descargas

            **Windows**
            - `Norm_Windows_${{ github.ref_name }}.zip` — Ejecutable portátil

            **Linux**
            - `Norm_Linux_${{ github.ref_name }}.tar.gz` — AppImage / bundle portable

            **Android** (experimental)
            - `Norm_${{ github.ref_name }}_arm64-v8a.apk` — Dispositivos modernos
            - `Norm_${{ github.ref_name }}_armeabi-v7a.apk` — Dispositivos antiguos
            - `Norm_${{ github.ref_name }}_x86_64.apk` — Emuladores

            **macOS** (experimental)
            - `Norm_macOS_v1.3.0.zip` — Aplicación para macOS

            ### Notas
            - Android y macOS son experimentales en esta versión.
            - Para Windows, también puedes generar un instalador `.exe` con Inno Setup
              usando `installer/setup.iss`.
          draft: false
          prerelease: false
          files: |
            artifacts/*/*

  deploy-pages:
    runs-on: ubuntu-latest
    needs: release
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
