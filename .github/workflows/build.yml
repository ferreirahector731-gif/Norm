name: Build All Platforms

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Windows
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build
        run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Norm_Windows_${{ github.ref_name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Norm_Windows_${{ github.ref_name }}.zip

  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build APKs (split-per-abi)
        run: flutter build apk --release --split-per-abi

      - name: Package
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk artifacts/Norm_${{ github.ref_name }}_arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/Norm_${{ github.ref_name }}_armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk artifacts/Norm_${{ github.ref_name }}_x86_64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/

  build-linux:
    name: Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build
        run: flutter build linux --release

      - name: Package
        run: |
          cd build/linux/x64/release/bundle
          tar czf ../../../../../Norm_Linux_${{ github.ref_name }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Norm_Linux_${{ github.ref_name }}.tar.gz

  build-macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Generate assets
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Build
        run: flutter build macos --release

      - name: Package macOS
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls *.app | head -1)
          if [ -z "$APP_NAME" ]; then
            echo "Error: No .app file found"
            exit 1
          fi
          echo "Packaging $APP_NAME"
          zip -r "../../../../Norm_macOS_v1.1.0.zip" "$APP_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: Norm_macOS_v1.1.0.zip

  release:
    name: Create Release
    needs: [build-windows, build-android, build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          name: Norm ${{ github.ref_name }}
          body: |
            ## Norm ${{ github.ref_name }}

            ### Descargas

            **Windows**
            - `Norm_Windows_${{ github.ref_name }}.zip` — Ejecutable portátil

            **Android**
            - `Norm_${{ github.ref_name }}_arm64-v8a.apk` — Dispositivos modernos (recomendado)
            - `Norm_${{ github.ref_name }}_armeabi-v7a.apk` — Dispositivos antiguos
            - `Norm_${{ github.ref_name }}_x86_64.apk` — Emuladores

            **Linux**
            - `Norm_Linux_${{ github.ref_name }}.tar.gz` — AppImage / bundle portable

            **macOS**
            - `Norm_macOS_${{ github.ref_name }}.zip` — Aplicación para macOS

            ### Notas
            - Las APKs **no están firmadas**; para distribución en Play Store se requiere
              firma adicional con `jarsigner` o Android Studio.
            - Para Windows, también puedes generar un instalador `.exe` con Inno Setup
              usando `installer/setup.iss`.
          draft: false
          prerelease: false
          files: |
            artifacts/*/*
