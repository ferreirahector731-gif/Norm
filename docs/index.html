<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norm &middot; Tus notas con inteligencia local</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a2a4a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .container { max-width: 780px; width: 100%; }
    .hero {
      background: linear-gradient(135deg, #1a2a4a 0%, #2a3a5a 100%);
      color: #fff;
      border-radius: 20px;
      padding: 3rem 2rem;
      text-align: center;
      margin-bottom: 2rem;
    }
    .hero h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
    .hero p { font-size: 1.1rem; color: #b0c4de; margin-bottom: 1rem; }
    .badge {
      display: inline-block;
      background: #4a90d9;
      color: #fff;
      padding: 0.2rem 1.2rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .section {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .section h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; color: #4a90d9; margin-bottom: 1rem; }
    .downloads { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: #1a2a4a; color: #fff; padding: 0.85rem 2rem; border-radius: 10px;
      text-decoration: none; font-weight: 500; font-size: 0.95rem;
      border: none; cursor: pointer; transition: all 0.2s; min-width: 130px; justify-content: center;
    }
    .btn:hover { background: #4a90d9; transform: translateY(-2px); }
    .btn.disabled { opacity: 0.35; pointer-events: none; }
    .version-item {
      padding: 0.8rem 0; border-bottom: 1px solid #eef1f5;
      display: flex; flex-wrap: wrap; align-items: baseline; gap: 0.5rem;
    }
    .version-item:last-child { border-bottom: none; }
    .version-tag { color: #4a90d9; font-weight: 700; font-size: 0.95rem; min-width: 80px; }
    .version-desc { color: #4a5a7a; font-size: 0.9rem; flex: 1; }
    .version-links a { color: #4a90d9; font-size: 0.85rem; margin-left: 0.5rem; text-decoration: none; }
    .version-links a:hover { text-decoration: underline; }
    .footer { text-align: center; margin: 2rem 0; font-size: 0.85rem; color: #8a9aba; }
    .footer a { color: #4a90d9; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .loading { color: #8a9aba; font-size: 0.9rem; }
    @media (max-width: 480px) {
      .hero h1 { font-size: 2.5rem; }
      .btn { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Norm</h1>
      <p>Tus notas con inteligencia local</p>
      <span class="badge">Beta</span>
    </div>

    <div class="section">
      <h2>Descargas</h2>
      <div class="downloads" id="downloads">
        <span class="loading">Cargando descargas...</span>
      </div>
    </div>

    <div class="section" id="releases-section">
      <h2>Novedades</h2>
      <div id="releases-content">
        <span class="loading">Cargando novedades...</span>
      </div>
    </div>

    <div class="footer">
      <a href="https://github.com/ferreirahector731-gif/Norm" target="_blank">Repositorio</a>
      &nbsp;&middot;&nbsp;
      <a href="https://github.com/ferreirahector731-gif/Norm/releases" target="_blank">Todos los releases</a>
      <br>
      <span id="version-footer">v1.4.0</span> &middot; Hecho con ❤️
    </div>
  </div>

  <script>
    const REPO = 'ferreirahector731-gif/Norm';
    const RELEASES_PER_PAGE = 3;
    const PLATFORMS = [
      { key: 'Windows', pattern: 'Windows', icon: '🪟' },
      { key: 'Linux',   pattern: 'Linux',   icon: '🐧' },
      { key: 'Android', pattern: 'apk',     icon: '📱' },
      { key: 'macOS',   pattern: 'macOS',   icon: '🍎' },
    ];

    async function fetchReleases() {
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/releases`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch (e) {
        console.error(e);
        return null;
      }
    }

    function getAssetUrl(release, pattern) {
      if (!release || !release.assets) return null;
      const a = release.assets.find(a => a.name.includes(pattern));
      return a ? a.browser_download_url : null;
    }

    function renderDownloads(releases) {
      const el = document.getElementById('downloads');
      if (!releases || !releases.length) {
        el.innerHTML = '<span class="loading">No hay releases disponibles</span>';
        return;
      }
      const latest = releases[0];
      let html = '';
      for (const p of PLATFORMS) {
        const url = getAssetUrl(latest, p.pattern);
        html += url
          ? `<a href="${url}" class="btn">${p.icon} ${p.key}</a>`
          : `<span class="btn disabled">${p.icon} ${p.key}</span>`;
      }
      el.innerHTML = html;
    }

    function renderReleases(releases) {
      const el = document.getElementById('releases-content');
      if (!releases || !releases.length) {
        el.innerHTML = '<span class="loading">Sin novedades</span>';
        return;
      }
      let html = '';
      const count = Math.min(RELEASES_PER_PAGE, releases.length);
      for (let i = 0; i < count; i++) {
        const r = releases[i];
        const body = (r.body || 'Sin descripción').split('\n')[0];
        html += `<div class="version-item">
          <span class="version-tag">${r.tag_name}</span>
          <span class="version-desc">${body}</span>
          <span class="version-links">
            <a href="${r.html_url}" target="_blank">Ver release</a>
          </span>
        </div>`;
      }
      el.innerHTML = html;
    }

    async function init() {
      const releases = await fetchReleases();
      if (releases) {
        renderDownloads(releases);
        renderReleases(releases);
        const latest = releases[0];
        if (latest) document.getElementById('version-footer').textContent = latest.tag_name;
      } else {
        document.getElementById('downloads').innerHTML = '<span class="loading">Error al cargar</span>';
        document.getElementById('releases-content').innerHTML = '<span class="loading">Error al cargar</span>';
      }
    }
    init();
  </script>
</body>
</html>
