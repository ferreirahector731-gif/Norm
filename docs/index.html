<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norm · Tu espacio para pensar</title>
  <meta name="description" content="Norm es una app open-source de planificación: notas, pizarrón y ofimática en un lienzo limpio y privado, con IA local e importación desde tus apps favoritas." />
  <meta name="theme-color" content="#0f9d68" />

  <!-- Open Graph / redes sociales -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Norm · Tu espacio para pensar" />
  <meta property="og:description" content="Notas, pizarrón y ofimática en un solo lienzo. Open source, privado y con IA local." />
  <meta property="og:image" content="assets/img/app-screenshot.png" />

  <!-- Favicon -->
  <link rel="icon" href="public/icon.svg" type="image/svg+xml" />

  <!-- Fuentes (Sora para títulos, Inter para texto) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- Estilos -->
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <a id="top"></a>

  <header class="site-header" id="site-header"><!-- header dinámico --></header>

  <main>
    <section class="hero" id="hero"><!-- portada --></section>
    <section class="section" id="caracteristicas" aria-label="Características"></section>
    <section class="section" id="vistazo" aria-label="Vistazo"></section>
    <section class="section" id="integraciones" aria-label="Integraciones"></section>
    <section class="section" id="ia" aria-label="IA local"></section>
    <section class="section" id="comunidad" aria-label="Comunidad"></section>
    <section class="section" id="descargar" aria-label="Descargas"></section>
    <section class="section" id="donar" aria-label="Donaciones"></section>
  </main>

  <footer class="site-footer" id="site-footer"><!-- pie dinámico --></footer>

  <!-- Scripts: primero datos e iconos, luego el motor -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
